<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏆業務開發積分賽🏆</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ffce00; --bg: #0b0b0b; --card: rgba(18, 18, 18, 0.98);
            --select-bg: #1a1a1a; --text: #fff; --success: #4ade80; --warning: #ff9d00; --encourage: #4facfe;
            --lv1: #a1a1a1; --lv2: #00d4ff; --lv3: #ffce00; --lv4: #ff8e53; --lv5: #ff00ff;
        }
        .main-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000 no-repeat center center fixed; background-size: cover; z-index: -2; opacity: 0.7; filter: blur(2px); transition: background-image 0.5s ease; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: -1; opacity: 0.6; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; overflow-x: hidden; }
        
        h1 { font-size: 32px; font-weight: 900; margin: 20px 0 10px 0; background: linear-gradient(to bottom, #fff, var(--lv3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
        
        .season-timer { 
            background: rgba(255, 0, 0, 0.15); border: 3px solid #ff4d4f; border-radius: 35px; 
            padding: 12px 0; margin: 10px 0 25px 0; width: 100%; max-width: 420px; text-align: center; 
            animation: warning-flash 1s infinite alternate ease-in-out;
            box-shadow: inset 0 0 20px rgba(255, 0, 0, 0.5);
        }
        @keyframes warning-flash { 
            from { box-shadow: inset 0 0 10px rgba(255, 0, 0, 0.3), 0 0 5px rgba(255, 77, 79, 0.4); border-color: rgba(255, 77, 79, 0.6); } 
            to { box-shadow: inset 0 0 30px rgba(255, 0, 0, 0.8), 0 0 40px rgba(255, 77, 79, 1); border-color: rgba(255, 77, 79, 1); } 
        }
        .timer-label { font-size: 13px; font-weight: bold; color: #ff4d4f; margin-bottom: 5px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,0,0,0.8); }
        .timer-digits { font-family: 'Courier New', monospace; font-size: 24px; font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.6); }

        .container-box { width: 100%; max-width: 500px; background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); box-sizing: border-box; }
        .h4-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        h4 { color: #888; font-size: 14px; margin: 0; display: flex; align-items: center; gap: 10px; }
        .title-rank { color: var(--lv2); }

        .side-trigger { background: #222; border: 1.5px solid var(--lv3); color: var(--lv3); padding: 10px 20px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 900; }

        .player-card { background: rgba(255,255,255,0.02); border-radius: 15px; padding: 20px; margin-bottom: 12px; position: relative; cursor: pointer; }
        .score-display { position: absolute; top: 20px; right: 20px; font-size: 24px; font-weight: 600; }
        
        .progress-bg { width: 100%; height: 6px; background: rgba(0,0,0,0.5); border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.5s ease; }

        .combo-glow { display: inline-flex; align-items: center; gap: 5px; margin-left: 8px; padding: 4px 12px; border-radius: 10px; background: linear-gradient(90deg, #ffcc33, #ff9933); color: #000; font-weight: 900; font-size: 12px; animation: combo-bounce 1.5s infinite ease-in-out; }
        @keyframes combo-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

        select, button#btn-submit { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--select-bg); color: #fff; font-size: 16px; margin-bottom: 15px; outline: none; appearance: none; }
        button#btn-submit { background: #f87171; font-weight: 900; cursor: pointer; }

        .scroll-log-container { max-height: 550px; overflow-y: auto; padding-right: 5px; }
        .log-row { padding: 15px 0; border-bottom: 1px solid #1a1a1a; }
        .log-meta-text { font-size: 12px; color: #666; margin-bottom: 8px; font-weight: bold; }
        .log-content-main { display: flex; align-items: center; justify-content: space-between; }
        
        .log-rent-box { display: flex; flex-direction: column; min-width: 85px; flex-shrink: 0; }
        .log-rent-text { font-size: 16px; font-weight: 800; }
        .log-room-text { font-size: 11px; color: #777; margin-top: 2px; font-weight: bold; }
        
        .log-process-text { font-size: 13px; font-weight: 400; color: #aaa; flex-grow: 1; margin-left: 10px; white-space: normal; }
        
        .score-align-box { min-width: 60px; text-align: left; padding-left: 5px; flex-shrink: 0; }
        .score-yellow { color: var(--lv3); font-style: italic; font-weight: 900; font-size: 15px; }
        
        .note-input { background: #000; border: 1px solid #222; border-radius: 8px; padding: 6px 10px; color: #fff; width: 85px; font-size: 11px; flex-shrink: 0; }

        .side-panel { position: fixed; top: 0; height: 100%; width: 85%; max-width: 400px; background: rgba(10, 10, 10, 0.98); z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 40px 20px; box-sizing: border-box; backdrop-filter: blur(20px); overflow-y: auto; }
        .left-panel { left: -100%; border-right: 1px solid rgba(255,255,255,0.1); }
        .left-panel.active { left: 0; }
        .right-panel { right: -100%; border-left: 1px solid rgba(255,255,255,0.1); }
        .right-panel.active { right: 0; }
        
        .vault-item { padding: 15px 0; border-bottom: 1px solid #222; color: #eee; }
        .vault-main { display: flex; justify-content: space-between; align-items: center; font-size: 15px; }

        .stat-card { background: #1a1a1a; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        #victory-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .mg-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 13px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .tag-lv1 { color: var(--lv1); } .tag-lv2 { color: var(--lv2); } .tag-lv3 { color: var(--lv3); } .tag-lv4 { color: var(--lv4); } .tag-lv5 { color: var(--lv5); }

        .vault-subtitle { color: var(--lv3); font-size: 16px; font-weight: bold; margin: 20px 0 10px 0; border-left: 3px solid var(--lv3); padding-left: 10px; }
        
        .btn-action { background: none; border: none; cursor: pointer; padding: 5px; font-size: 16px; flex-shrink: 0; }
        .del-box { min-width: 30px; display: flex; justify-content: flex-end; flex-shrink: 0; }
        
        /* [增修] 列表內刪除按鈕樣式 */
        .vault-del-btn { color: #ff4d4f; cursor: pointer; font-size: 20px; font-weight: bold; padding: 5px; }
    </style>
</head>
<body>
    <div id="main-bg" class="main-background"></div><div class="overlay"></div>
    <h1>🏆業務開發積分賽🏆</h1>
    
    <div class="season-timer">
        <div class="timer-label">距 離 賽 季 結 束 倒 數</div>
        <div id="countdown" class="timer-digits">00d 00h 00m 00s</div>
    </div>

    <div class="container-box"><h4 class="title-rank">📊 戰力排行</h4><div id="rank-list"></div></div>
    
    <div class="container-box">
        <h4>⚔️ 戰報結算</h4>
        <select id="p-select"></select>
        <select id="type-select">
            <option value="雅房">🏠 雅房</option>
            <option value="套房" selected>🏠 套房</option>
            <option value="2房">🏠 2房</option>
            <option value="3房">🏠 3房</option>
            <option value="4房">🏠 4房</option>
        </select>
        <select id="m-select">
            <option value="1">1萬以下</option>
            <option value="1.2">1萬-2萬</option>
            <option value="1.4">2-3萬</option>
            <option value="1.6">3-4萬</option>
            <option value="2">4萬以上</option>
        </select>
        <select id="r-select">
            <option value="120_con">成功約到委託 (+120)</option>
            <option value="100">接受服務費 (+100)</option>
            <option value="120">加Line並配案 (+120)</option>
            <option value="999">暫時拒絕但可追蹤 (+0)</option>
            <option value="0">被屋主拒絕 (+0)</option>
        </select>
        <button id="btn-submit" onclick="processBattle()">結算並送出</button>
    </div>

    <div class="container-box">
        <div class="h4-row">
            <h4>📋 即時戰況回報</h4>
            <button class="side-trigger" onclick="toggleVault()">可配案列表🏃</button>
        </div>
        <div id="history-log" class="scroll-log-container"></div>
    </div>

    <div style="text-align:center; padding: 20px 0;"><button onclick="toggleSettings()" style="background:none; border:1px solid #333; color:#666; font-size:11px; padding: 8px 20px; border-radius: 10px;">⚙️ 遊戲管理</button>
        <div id="settings-content" style="display:none; margin-top:20px; max-width: 300px; margin-left: auto; margin-right: auto;">
            <button class="mg-btn" style="background:#222; color:#aaa;" onclick="changeGameBG()">更換遊戲背景網址</button>
            <button class="mg-btn" style="background:#400; color:#ff4d4f; border:1px solid #600;" onclick="fullReset()">🚨 賽季數據歸零</button>
        </div>
    </div>

    <div id="vault-panel" class="side-panel left-panel">
        <span onclick="toggleVault()" style="position:absolute;top:20px;right:20px;font-size:30px;color:#666;cursor:pointer;">×</span>
        <h3 style="margin-top:0; color:var(--lv4);">🏃 可配案物件清單</h3>
        <div class="vault-subtitle">🏠 委託物件</div>
        <div id="contract-list"></div>
        <div class="vault-subtitle">🏃 可配案物件</div>
        <div id="line-list"></div>
    </div>

    <div id="dashboard" class="side-panel right-panel">
        <span onclick="closeDB()" style="position:absolute;top:20px;left:20px;font-size:30px;color:#666;cursor:pointer;">×</span>
        <div id="db-content"></div>
    </div>

    <div id="victory-mask">
        <div style="width:80%; max-width:350px; background:#000; border-radius:20px; padding:40px 20px; text-align:center; border: 2px solid #333;" id="vic-box">
            <h2 id="vic-title" style="letter-spacing:5px;">VICTORY</h2><h1 id="vic-score" style="font-size:70px;">+0</h1><p id="vic-msg" style="color:#888;margin-bottom:20px;"></p>
            <button onclick="document.getElementById('victory-mask').style.display='none'" style="background:var(--primary);border:none;padding:15px 40px;border-radius:10px;font-weight:900;cursor:pointer;">收下榮耀</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBy4aSyxv9PYOHk1NSxYcCr3lsUQx6DuE8", authDomain: "brawl-project.firebaseapp.com", databaseURL: "https://brawl-project-default-rtdb.firebaseio.com", projectId: "brawl-project", storageBucket: "brawl-project.firebasestorage.app", messagingSenderId: "235049960784", appId: "1:235049960784:web:3fbe964579806e29fa5855" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let ps = [], logs = [], config = { bg: 'bg.jpg' };
        const TIERS = [ { c: '#a1a1a1', n: '青銅' }, { c: '#00d4ff', n: '白銀' }, { c: '#ffce00', n: '黃金' }, { c: '#ff8e53', n: '白金' }, { c: '#ff00ff', n: '傳奇' } ];

        db.ref('team_data').on('value', (s) => { 
            const d = s.val(); 
            if (d) { ps = d.players || []; logs = d.logs || []; if (d.config) config = d.config; refreshUI(); } 
        });

        function getIdle(t) { if (!t) return "尚未開工"; const diff = new Date().getTime() - t; const m = Math.floor(diff/60000); if (m < 60) return `${m}分鐘前開發`; const h = Math.floor(m/60); return `${h}小時前開發`; }
        function getL(r) { if(r==='4萬以上') return 'tag-lv5'; if(r==='3-4萬' || r==='1.6') return 'tag-lv4'; if(r==='2-3萬' || r==='1.4') return 'tag-lv3'; if(r==='1萬-2萬' || r==='1.2') return 'tag-lv2'; return 'tag-lv1'; }

        function refreshUI() {
            if(config.bg) document.getElementById('main-bg').style.backgroundImage = `url('${config.bg}')`;
            const sel = document.getElementById('p-select'); const cur = sel.value; sel.innerHTML = '';
            ps.forEach(p => { let o = document.createElement('option'); o.value = p.n; o.innerText = p.n; sel.appendChild(o); }); if(cur) sel.value = cur;
            const sorted = [...ps].sort((a,b) => b.s - a.s); let html = '';
            sorted.forEach((p) => {
                const tierIdx = Math.min(Math.floor((p.s||0)/2000), 4); const t = TIERS[tierIdx];
                const comboHtml = p.combo > 0 ? `<span class="combo-glow">🔥 ${p.combo} COMBO</span>` : '';
                html += `<div class="player-card" style="border-left: 4px solid ${t.c}" onclick="showDB('${p.n}')">
                    <div style="font-size:18px;font-weight:bold;">${p.n} <span style="color:${t.c};font-size:14px;">[${t.n}]</span> ${comboHtml}</div>
                    <div style="font-size:12px;color:#444;margin-top:8px;">總開發：${p.count || 0} 次 &nbsp;&nbsp; ${getIdle(p.lastTime)}</div>
                    <div class="score-display" style="color:${t.c}">${Math.floor(p.s)}</div>
                    <div class="progress-bg"><div class="progress-fill" style="width:${(p.s % 2000) / 20}%;background:${t.c}"></div></div>
                </div>`;
            });
            document.getElementById('rank-list').innerHTML = html;
            
            let logH = ''; const nowTime = new Date().getTime();
            logs.slice(0, 50).forEach((l, idx) => {
                const pureProcess = l.process ? l.process.replace(/\(\+\d+\)/g, '').trim() : ''; 
                const scoreText = l.gain > 0 ? `+${l.gain}` : ''; 
                const timeDiff = nowTime - (l.timestamp || 0);
                const canEdit = timeDiff < (2 * 60 * 60 * 1000); 
                
                const lockIcon = (l.gain > 0) ? (canEdit ? `<button onclick="toggleLock(${idx})" class="btn-action">${l.locked ? '🔒' : '🔓'}</button>` : `<span class="btn-action">🔒</span>`) : '<div style="width:26px;"></div>';
                const delBtn = canEdit ? `<button onclick="deleteLog(${idx})" class="btn-action" style="color:#ff4d4f;">×</button>` : '<div style="width:30px;"></div>';

                logH += `<div class="log-row">
                    <div class="log-meta-text">${l.fullDate}  &nbsp; ${l.name}</div>
                    <div class="log-content-main">
                        <div class="log-rent-box">
                            <span class="log-rent-text ${getL(l.rentRange)}">${l.rentRange||''}</span>
                            <span class="log-room-text">${l.roomType||'套房'}</span>
                        </div>
                        <span class="log-process-text">${pureProcess}</span>
                        <div class="score-align-box"><span class="score-yellow">${scoreText}</span></div>
                        <input type="text" class="note-input" placeholder="備註" value="${l.note||''}" onchange="upN(${idx},this.value)" ${(!canEdit && l.locked)?'disabled':''}>
                        ${lockIcon}
                        <div class="del-box">${delBtn}</div>
                    </div>
                </div>`;
            });
            document.getElementById('history-log').innerHTML = logH || '<div style="color:#444;text-align:center;margin-top:20px;">等待回報中...</div>';
            
            // [增修] 3. 物件分類列表動態渲染（加入房型顯示與刪除按鈕）
            let contractH = '', lineH = '';
            logs.filter(l => l.locked && l.note).forEach((v, idx) => { 
                // 找出原 logs 中的正確索引以便刪除（解除鎖定）
                const originalIdx = logs.indexOf(v);
                let itemHtml = `<div class="vault-item">
                    <div class="vault-main">
                        <span><b>${v.note}</b></span>
                        <span class="vault-del-btn" onclick="toggleLock(${originalIdx})">×</span>
                    </div>
                    <div style="font-size:12px;color:#666;margin-top:2px;">${v.name} | ${v.roomType || '套房'} | ${v.rentRange}</div>
                </div>`;
                if(v.type === 'contract') contractH += itemHtml; else lineH += itemHtml;
            });
            document.getElementById('contract-list').innerHTML = contractH || '<div style="color:#333;font-size:12px;padding:10px;">目前尚無委託物件</div>';
            document.getElementById('line-list').innerHTML = lineH || '<div style="color:#333;font-size:12px;padding:10px;">目前尚無配案資料</div>';
        }

        function processBattle() {
            const p = ps.find(x => x.n === document.getElementById('p-select').value);
            const rSelect = document.getElementById('r-select');
            const rValRaw = rSelect.value;
            const rVal = parseFloat(rValRaw);
            const m = parseFloat(document.getElementById('m-select').value);
            const rText = rSelect.options[rSelect.selectedIndex].text;
            const roomType = document.getElementById('type-select').value;
            const now = new Date();
            
            let type = 'line'; let gain = 0;
            if (rValRaw === '999') {
                p.track_count = (p.track_count || 0) + 1;
                showVictory(0, "已加入追蹤清單，持續跟進！", false);
            } else {
                if (rValRaw === '120_con') { type = 'contract'; p.con_count = (p.con_count || 0) + 1; }
                gain = (rVal >= 100) ? Math.floor((rVal * m) + (p.combo * 10)) : 0;
                p.s += gain; p.combo = (gain > 0) ? (p.combo || 0) + 1 : 0; 
                p.count = (p.count || 0) + 1; p.lastTime = now.getTime();
                if (gain > 0) p.fee_count = (p.fee_count || 0) + 1;
                if (rVal === 120 && rValRaw !== '120_con') p.line_count = (p.line_count || 0) + 1;
                if (rVal === 0) p.refused_count = (p.refused_count || 0) + 1;
                showVictory(gain, gain > 0 ? "完美的開發！離下個階級更近了！" : "沒關係，下一通會更好！", gain > 0);
            }
            logs.unshift({ name: p.n, fullDate: `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`, gain: gain, process: rText, rentRange: document.getElementById('m-select').options[document.getElementById('m-select').selectedIndex].text, roomType: roomType, note: '', locked: false, type: type, timestamp: now.getTime() });
            db.ref('team_data').set({ players: ps, logs: logs, config: config });
        }

        function deleteLog(idx) {
            if(!confirm("確定要刪除這筆戰報嗎？系統將自動扣除對應積分與統計次數。")) return;
            const log = logs[idx]; const p = ps.find(x => x.n === log.name);
            if(p) {
                p.s -= log.gain; p.count = Math.max(0, p.count - 1);
                if(log.gain > 0) p.fee_count = Math.max(0, p.fee_count - 1);
                if(log.type === 'contract') p.con_count = Math.max(0, p.con_count - 1);
                else if(log.process.includes("加Line")) p.line_count = Math.max(0, p.line_count - 1);
                else if(log.process.includes("被屋主拒絕")) p.refused_count = Math.max(0, p.refused_count - 1);
                else if(log.process.includes("暫時拒絕但可追蹤")) p.track_count = Math.max(0, p.track_count - 1);
            }
            logs.splice(idx, 1); db.ref('team_data').set({ players: ps, logs: logs, config: config });
        }

        function toggleLock(i) { logs[i].locked = !logs[i].locked; db.ref('team_data/logs').set(logs); }
        function showVictory(s, m, w) {
            document.getElementById('vic-score').innerText = w ? `+${s}` : `+0`;
            document.getElementById('vic-msg').innerText = m;
            document.getElementById('vic-title').innerText = w ? "VICTORY" : "KEEP GOING";
            document.getElementById('vic-box').style.borderColor = w ? "var(--lv3)" : "var(--lv2)";
            document.getElementById('vic-score').style.color = w ? "var(--lv3)" : "var(--lv2)";
            document.getElementById('victory-mask').style.display = 'flex';
            if (w) confetti({ particleCount: 150, spread: 70 });
        }

        function showDB(n) {
            const p = ps.find(x => x.n === n); const t = TIERS[Math.min(Math.floor((p.s||0)/2000), 4)];
            document.getElementById('dashboard').classList.add('active');
            const successRate = p.count > 0 ? ((p.fee_count || 0) / p.count * 100).toFixed(1) : 0;
            document.getElementById('db-content').innerHTML = `
                <div style="width:120px;height:120px;margin:20px auto;border:2px solid ${t.c};border-radius:20px;overflow:hidden;"><img src="${p.avatar||''}" style="width:100%;height:100%;object-fit:cover;"></div>
                <h2 style="text-align:center;">${p.n}</h2><div style="text-align:center;color:${t.c};font-weight:900;margin-bottom:30px;">階級：${t.n}</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
                    <div class="stat-card">總積分<br><span style="color:${t.c};font-size:18px;font-weight:900;">${Math.floor(p.s||0)}</span></div>
                    <div class="stat-card">成功率<br><span style="color:var(--success);font-size:18px;font-weight:900;">${successRate}%</span></div>
                    <div class="stat-card">接受服務費<br><span style="color:#ffce00;font-size:18px;font-weight:900;">${p.fee_count||0}</span></div>
                    <div class="stat-card">被拒絕<br><span style="color:#ff4d4f;font-size:18px;font-weight:900;">${p.refused_count||0}</span></div>
                    <div class="stat-card">直接委託<br><span style="color:#ffcc33;font-size:18px;font-weight:900;">${p.con_count||0}</span></div>
                    <div class="stat-card">總開發量<br><span style="color:#fff;font-size:18px;font-weight:900;">${p.count||0}</span></div>
                    <div class="stat-card">追蹤中<br><span style="color:var(--lv2);font-size:18px;font-weight:900;">${p.track_count||0}</span></div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><button onclick="changeName('${n}')" style="background:#333;color:#fff;border:none;padding:12px;border-radius:10px;font-size:12px;">更改姓名</button><button onclick="document.getElementById('fileInput').click()" style="background:var(--success);color:#000;border:none;padding:12px;border-radius:10px;font-size:12px;font-weight:bold;">上傳照片</button></div>
                <button onclick="changeA('${n}')" style="width:100%;margin-top:15px;background:#1a1a1a;color:#666;border:none;padding:10px;border-radius:10px;font-size:11px;">更換照片網址</button>
                <input type="file" id="fileInput" style="display:none" accept="image/*" onchange="handleUpload('${n}')">
            `;
        }

        function changeGameBG() { const url = prompt("請輸入背景圖網址：", config.bg||""); if(url){ config.bg = url; db.ref('team_data/config').set(config); } }
        function changeName(oldN) { const newN = prompt("新姓名：", oldN); if (newN && newN !== oldN) { const p = ps.find(x => x.n === oldN); p.n = newN; logs.forEach(l => { if(l.name === oldN) l.name = newN; }); db.ref('team_data').set({players:ps, logs:logs, config:config}); closeDB(); } }
        function handleUpload(n) { const file = document.getElementById('fileInput').files[0]; if (file) { const r = new FileReader(); r.onload = function(e) { ps.find(x => x.n === n).avatar = e.target.result; db.ref('team_data').set({players:ps, logs:logs, config:config}); showDB(n); }; r.readAsDataURL(file); } }
        function changeA(n) { const u = prompt("照片網址："); if(u){ ps.find(x=>x.n===n).avatar=u; db.ref('team_data').set({players:ps, logs:logs, config:config}); showDB(n); } }
        function toggleVault() { document.getElementById('vault-panel').classList.toggle('active'); }
        function toggleSettings() { const s = document.getElementById('settings-content'); s.style.display = s.style.display==='none'?'block':'none'; }
        function upN(i, v) { logs[i].note = v; db.ref('team_data/logs').set(logs); }
        function closeDB() { document.getElementById('dashboard').classList.remove('active'); }
        function fullReset() { if(confirm('⚠️ 數據歸零？')){ ps.forEach(p => { p.s=0; p.combo=0; p.count=0; p.fee_count=0; p.line_count=0; p.con_count=0; p.refused_count=0; p.track_count=0; p.lastTime=null; }); db.ref('team_data').set({ players: ps, logs: [], config: config }); alert('已重置！'); } }
        
        setInterval(() => {
            const now = new Date(); const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59); const diff = lastDay - now;
            if (diff <= 0) { document.getElementById('countdown').innerHTML = "SEASON END"; return; }
            const d = Math.floor(diff/86400000); const h = Math.floor((diff%86400000)/3600000).toString().padStart(2,'0');
            const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0'); const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
            document.getElementById('countdown').innerHTML = `${d}d ${h}h ${m}m ${s}s`;
        }, 1000);
    </script>
</body>
</html>
