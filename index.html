<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>🏆業務開發積分賽🏆</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #ffce00; --bg: #0b0b0b; --card: rgba(18, 18, 18, 0.98);
            --select-bg: #1a1a1a; --text: #fff; --success: #4ade80; --warning: #ff9d00; --encourage: #4facfe;
            --lv1: #a1a1a1; --lv2: #00d4ff; --lv3: #ffce00; --lv4: #ff8e53; --lv5: #ff00ff;
        }
        .main-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000 no-repeat center center fixed; background-size: cover; z-index: -2; opacity: 0.7; filter: blur(2px); transition: background-image 0.5s ease; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: -1; opacity: 0.6; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; overflow-x: hidden; min-height: 100vh; }
        
        .nav-btn { position: fixed; top: 25px; left: 20px; z-index: 1001; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        .side-nav { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #111; z-index: 1002; transition: 0.3s; padding: 60px 20px; box-sizing: border-box; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .side-nav.active { left: 0; }
        .nav-item { padding: 15px; color: #aaa; font-size: 16px; cursor: pointer; border-radius: 10px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: var(--lv2); color: #000; font-weight: bold; }
        .nav-spacer { flex-grow: 1; }
        
        .page-content { width: 100%; max-width: 500px; display: none; flex-direction: column; align-items: center; }
        #page-main { display: flex; }

        h1 { font-size: 32px; font-weight: 900; margin: 20px 0 10px 0; background: linear-gradient(to bottom, #fff, var(--lv3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; text-align: center; }
        
        .season-timer { background: rgba(255, 0, 0, 0.15); border: 3px solid #ff4d4f; border-radius: 35px; padding: 12px 0; margin: 10px 0 25px 0; width: 100%; max-width: 420px; text-align: center; animation: warning-flash 1s infinite alternate ease-in-out; box-shadow: inset 0 0 20px rgba(255, 0, 0, 0.5); }
        @keyframes warning-flash { from { box-shadow: inset 0 0 10px rgba(255, 0, 0, 0.3), 0 0 5px rgba(255, 77, 79, 0.4); border-color: rgba(255, 77, 79, 0.6); } to { box-shadow: inset 0 0 30px rgba(255, 0, 0, 0.8), 0 0 40px rgba(255, 77, 79, 1); border-color: rgba(255, 77, 79, 1); } }
        .timer-label { font-size: 13px; font-weight: bold; color: #ff4d4f; margin-bottom: 5px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,0,0,0.8); }
        .timer-digits { font-family: 'Courier New', monospace; font-size: 24px; font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.6); }

        .container-box { width: 100%; background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); box-sizing: border-box; }
        h4 { color: #888; font-size: 14px; margin: 0 0 20px 0; text-align: left; width: 100%; }

        .player-card { background: rgba(255,255,255,0.02); border-radius: 15px; padding: 20px; margin-bottom: 12px; position: relative; cursor: pointer; width: 100%; box-sizing: border-box; }
        .score-display { position: absolute; top: 20px; right: 20px; font-size: 24px; font-weight: 600; }
        .progress-bg { width: 100%; height: 6px; background: rgba(0,0,0,0.5); border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.5s ease; }
        
        .combo-glow { display: inline-flex; align-items: center; gap: 5px; margin-left: 8px; padding: 4px 12px; border-radius: 10px; background: linear-gradient(90deg, #ffcc33, #ff9933); color: #000; font-weight: 900; font-size: 12px; animation: combo-bounce 1.5s infinite ease-in-out; }
        @keyframes combo-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

        select, button#btn-submit { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--select-bg); color: #fff; font-size: 16px; margin-bottom: 15px; outline: none; appearance: none; }
        button#btn-submit { background: #f87171; font-weight: 900; cursor: pointer; }

        /* 戰況字體顏色樣式 */
        .tag-lv1 { color: var(--lv1); } .tag-lv2 { color: var(--lv2); } .tag-lv3 { color: var(--lv3); } .tag-lv4 { color: var(--lv4); } .tag-lv5 { color: var(--lv5); }

        .scroll-log-container { max-height: 550px; overflow-y: auto; width: 100%; }
        .log-row { padding: 15px 0; border-bottom: 1px solid #1a1a1a; width: 100%; }
        .log-meta-text { font-size: 12px; color: #666; margin-bottom: 8px; font-weight: bold; }
        .log-content-main { display: flex; align-items: center; width: 100%; gap: 10px; }
        .log-rent-box { width: 75px; flex-shrink: 0; }
        .log-rent-text { font-size: 13px; font-weight: 800; }
        .log-process-text { font-size: 12px; color: #aaa; flex-grow: 1; word-break: break-all; line-height: 1.3; } 
        .score-yellow { width: 45px; text-align: right; color: var(--lv3); font-weight: 900; font-size: 14px; flex-shrink: 0; }
        .note-container { width: 65px; flex-shrink: 0; }
        .note-input { background: #000; border: 1px solid #222; border-radius: 8px; padding: 6px 4px; color: #fff; width: 100%; font-size: 11px; box-sizing: border-box; }
        .action-cell { width: 32px; flex-shrink: 0; display: flex; justify-content: center; } 
        .delete-cell { width: 28px; flex-shrink: 0; display: flex; justify-content: center; } 
        .btn-action { background: none; border: none; cursor: pointer; padding: 5px; font-size: 16px; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 600px) {
            .log-content-main { gap: 6px; }
            .log-rent-box { width: 65px; }
            .note-container { width: 60px; }
            .score-yellow { width: 40px; font-size: 13px; }
            .log-process-text { font-size: 11px; }
        }

        /* 列表排版 */
        .vault-item { padding: 15px 12px; border-bottom: 1px solid #222; display: flex; align-items: center; width: 100%; box-sizing: border-box; }
        .vault-info { flex-grow: 1; min-width: 0; }
        .vault-header { font-size: 16px; font-weight: 800; margin-bottom: 4px; color: #fff; } 
        .vault-subtitle { font-size: 11px; color: #777; font-weight: 500; }
        .vault-detail-note { width: 140px; margin-right: 10px; flex-shrink: 0; } 
        .vault-input { background: #000; border: 1px solid #333; border-radius: 8px; padding: 8px; color: #fff; width: 100%; font-size: 11px; box-sizing: border-box; }
        .vault-link-btn { width: 35px; height: 35px; background: #222; border: 1px solid #444; color: var(--lv2); border-radius: 8px; cursor: pointer; font-size: 14px; margin-right: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .vault-delete-btn { width: 25px; flex-shrink: 0; text-align: center; color: #f44; cursor: pointer; font-weight: bold; font-size: 18px; }

        .side-panel { position: fixed; top: 0; right: -100%; height: 100%; width: 85%; max-width: 400px; background: rgba(10, 10, 10, 0.98); z-index: 1000; transition: 0.4s; padding: 30px 20px; box-sizing: border-box; backdrop-filter: blur(20px); overflow-y: auto; }
        .side-panel.active { right: 0; border-left: 1px solid rgba(255,255,255,0.1); }
        .stat-card { background: #1a1a1a; padding: 12px 5px; border-radius: 12px; text-align: center; border: 1px solid #333; font-size: 11px; color: #888; }
        .stat-card span { font-size: 18px; font-weight: 900; color: #fff; display: block; margin-top: 5px; }

        .radar-box { position: relative; width: 100%; max-width: 320px; height: 260px; margin: 10px auto; display: flex; justify-content: center; align-items: center; }
        canvas#dbRadarChart { max-width: 100% !important; max-height: 100% !important; }
        #radar-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 320px; background: #1a1a1a; border: 1px solid var(--lv3); padding: 20px; border-radius: 20px; z-index: 3000; display: none; }
        #victory-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .mg-btn { padding: 12px; border-radius: 10px; border: none; font-size: 13px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="main-bg" class="main-background"></div><div class="overlay"></div>
    <button class="nav-btn" onclick="toggleNav()">☰</button>

    <div id="side-nav" class="side-nav">
        <h2 style="margin-bottom:30px; color:var(--lv3);">MENU</h2>
        <div class="nav-item active" id="ni-main" onclick="switchPage('main')">🏆 積分競技場</div>
        <div class="nav-item" id="ni-vault" onclick="switchPage('vault')">🏃 可配案列表</div>
        <div class="nav-item" id="ni-analysis" onclick="switchPage('analysis')">📊 數據分析看板</div>
        <div class="nav-spacer"></div>
        <div id="settings-area">
            <div id="settings-content" style="display:none; padding: 10px 0;">
                <div style="display:flex; gap:5px; margin-bottom: 10px;">
                    <button class="mg-btn" style="background:var(--success); color:#000; flex:1;" onclick="addNewPlayer()">新增業務</button>
                    <button class="mg-btn" style="background:#ff4d4f; color:#fff; flex:1;" onclick="removePlayer()">移除業務</button>
                </div>
                <button class="mg-btn" style="background:#222; color:#aaa; width:100%;" onclick="changeGameBG()">更換背景圖</button>
                <button class="mg-btn" style="background:#400; color:#ff4d4f; border:1px solid #600;" onclick="fullReset()">🚨 賽季歸零結算</button>
            </div>
            <div class="nav-item" onclick="toggleSettings()">⚙️ 遊戲管理控制</div>
        </div>
    </div>

    <div id="page-main" class="page-content" style="display: flex;">
        <h1>🏆業務開發積分賽🏆</h1>
        <div class="season-timer">
            <div class="timer-label">距 離 賽 季 結 束 倒 數</div>
            <div id="countdown" class="timer-digits">00d 00h 00m 00s</div>
        </div>
        <div class="container-box"><h4>📊 戰力排行</h4><div id="rank-list"></div></div>
        <div class="container-box">
            <h4>⚔️ 戰報結算</h4>
            <select id="p-select"></select>
            <select id="type-select">
                <option value="雅房">🏠 雅房</option><option value="套房" selected>🏠 套房</option><option value="2房">🏠 2房</option><option value="3房">🏠 3房</option><option value="4房">🏠 4房</option>
            </select>
            <select id="m-select">
                <option value="1">1萬以下</option><option value="1.2">1萬-2萬</option><option value="1.4">2-3萬</option><option value="1.6">3-4萬</option><option value="2">4萬以上</option>
            </select>
            <select id="r-select">
                <option value="120_con">成功約到委託 (+120)</option><option value="100">接受服務費 (+100)</option><option value="120">加Line並配案 (+120)</option><option value="999">暫時拒絕但可追蹤 (+0)</option><option value="0">被屋主拒絕 (+0)</option>
            </select>
            <button id="btn-submit" onclick="processBattle()">結算並送出</button>
        </div>
        <div class="container-box"><h4>📋 即時戰況回報</h4><div id="history-log" class="scroll-log-container"></div></div>
    </div>

    <div id="page-vault" class="page-content">
        <h2 style="color:var(--lv4); margin: 20px 0;">🏃 可配案物件管理</h2>
        <div class="container-box"><div style="color:var(--lv3); font-weight:bold; margin-bottom:10px;">🏠 委託物件</div><div id="contract-list"></div></div>
        <div class="container-box"><div style="color:var(--lv2); font-weight:bold; margin-bottom:10px;">🏃 可配案物件</div><div id="line-list"></div></div>
    </div>

    <div id="page-analysis" class="page-content"><h2 style="color:var(--lv2); margin: 20px 0;">📊 全團隊統計</h2><div class="container-box"><h4>🏠 房型分佈</h4><canvas id="roomChart"></canvas></div><div class="container-box"><h4>🕒 開發熱點</h4><canvas id="timeChart"></canvas></div></div>

    <div id="dashboard" class="side-panel"><span onclick="closeDB()" style="position:absolute;top:20px;left:20px;font-size:30px;color:#666;cursor:pointer;">×</span><div id="db-content"></div></div>
    
    <div id="victory-mask"><div style="width:80%; max-width:350px; background:#000; border-radius:20px; padding:40px 20px; text-align:center; border: 2px solid #333;" id="vic-box"><h2 id="vic-title" style="letter-spacing:5px;">VICTORY</h2><h1 id="vic-score" style="font-size:70px;">+0</h1><p id="vic-msg" style="color:#888;margin-bottom:20px;"></p><button onclick="document.getElementById('victory-mask').style.display='none'" style="background:var(--primary);border:none;padding:15px 40px;border-radius:10px;font-weight:900;cursor:pointer;">收下榮耀</button></div></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBy4aSyxv9PYOHk1NSxYcCr3lsUQx6DuE8", authDomain: "brawl-project.firebaseapp.com", databaseURL: "https://brawl-project-default-rtdb.firebaseio.com", projectId: "brawl-project", storageBucket: "brawl-project.firebasestorage.app", messagingSenderId: "235049960784", appId: "1:235049960784:web:3fbe964579806e29fa5855" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let ps = [], logs = [], config = { bg: 'bg.jpg' }, archives = [];
        const TIERS = [ { c: '#a1a1a1', n: '青銅' }, { c: '#00d4ff', n: '白銀' }, { c: '#ffce00', n: '黃金' }, { c: '#ff8e53', n: '白金' }, { c: '#ff00ff', n: '傳奇' } ];
        let rc, tc, dbRadar;

        db.ref('team_data').on('value', (s) => { 
            const d = s.val(); 
            if (d) { 
                ps = d.players || []; logs = d.logs || []; archives = d.archives || []; if (d.config) config = d.config; 
                refreshUI(); 
                const activeName = document.querySelector('#dashboard h2')?.innerText;
                if(activeName && document.getElementById('dashboard').classList.contains('active')) showDB(activeName);
            } 
        });

        function refreshUI() {
            if(config.bg) document.getElementById('main-bg').style.backgroundImage = `url('${config.bg}')`;
            const sel = document.getElementById('p-select'); const cur = sel.value; sel.innerHTML = '';
            ps.forEach(p => { let o = document.createElement('option'); o.value = p.n; o.innerText = p.n; sel.appendChild(o); }); if(cur) sel.value = cur;
            const sorted = [...ps].sort((a,b) => b.s - a.s);
            document.getElementById('rank-list').innerHTML = sorted.map(p => {
                const t = TIERS[Math.min(Math.floor((p.s||0)/2000), 4)];
                const pLogs = logs.filter(l => l.name === p.n);
                const lastTime = pLogs.length > 0 ? pLogs[0].timestamp : 0;
                let timeStr = "尚未開發";
                if(lastTime) { const diff = (Date.now() - lastTime) / 3600000; timeStr = diff < 1 ? "剛剛開發" : `距離上次開發：${Math.floor(diff)}小時前`; }

                return `<div class="player-card" style="border-left: 4px solid ${t.c}" onclick="showDB('${p.n}')">
                    <div style="font-size:18px;font-weight:bold;">${p.n} <span style="color:${t.c};font-size:14px;">[${t.n}]</span> ${p.combo > 1 ? `<span class="combo-glow">🔥 ${p.combo} COMBO</span>` : ''}</div>
                    <div style="font-size:12px;color:#444;margin-top:8px;">總開發：${p.count || 0} 次</div>
                    <div style="font-size:11px;color:#666;margin-top:4px;">${timeStr}</div>
                    <div class="score-display" style="color:${t.c}">${Math.floor(p.s)}</div>
                    <div class="progress-bg"><div class="progress-fill" style="width:${(p.s % 2000) / 20}%;background:${t.c}"></div></div>
                </div>`;
            }).join('');
            
            document.getElementById('history-log').innerHTML = logs.slice(0, 50).map((l, idx) => {
                const canE = Date.now() - (l.timestamp || 0) < 7200000;
                const isTrack = l.process.includes("暫時拒絕但可追蹤");
                const actionBtn = isTrack ? `<button onclick="convertLog(${idx})" class="btn-action">🔄</button>` : (l.gain > 0 ? `<button onclick="toggleLock(${idx})" class="btn-action">${l.locked ? '🔒' : '🔓'}</button>` : '');
                // [重要] 補回 getL 函數調用確保價位顏色恢復
                return `<div class="log-row"><div class="log-meta-text">${l.fullDate} | ${l.name}</div><div class="log-content-main"><div class="log-rent-box"><span class="log-rent-text ${getL(l.rentRange)}">${l.rentRange}</span></div><span class="log-process-text">${l.process.split('(')[0]}</span><span class="score-yellow">${l.gain>0?'+'+l.gain:''}</span><div class="note-container"><input type="text" class="note-input" value="${l.note||''}" onchange="upN(${idx},this.value)" ${(!canE && l.locked)?'disabled':''}></div><div class="action-cell">${actionBtn}</div><div class="delete-cell"><button onclick="deleteLog(${idx})" class="btn-action" style="color:#ff4d4f;">×</button></div></div></div>`;
            }).join('');

            let cH = '', lH = '';
            logs.filter(l => l.locked).forEach(v => { 
                const oI = logs.indexOf(v);
                let item = `<div class="vault-item"><div class="vault-info"><div class="vault-header">${v.note || '未命名案件'}</div><div class="vault-subtitle">${v.name} | ${v.roomType} | ${v.rentRange}</div></div><button class="vault-link-btn" onclick="open591(${oI})">🔗</button><div class="vault-detail-note"><input type="text" class="vault-input" value="${v.listDetail||''}" onchange="upLD(${oI},this.value)" placeholder="輸入價格細節..."></div><div class="vault-delete-btn" onclick="toggleLock(${oI})">×</div></div>`;
                if(v.type === 'contract') cH += item; else lH += item;
            });
            document.getElementById('contract-list').innerHTML = cH || '暫無委託'; document.getElementById('line-list').innerHTML = lH || '暫無配案';
        }

        function open591(idx) {
            const l = logs[idx];
            if (!l.url591) {
                const url = prompt("請輸入 591 網址：", "https://");
                if (url && url !== "https://") { l.url591 = url; db.ref('team_data/logs').set(logs); window.open(url, '_blank'); }
            } else { if(confirm("跳轉 591？(取消可重新設定)")) { window.open(l.url591, '_blank'); } else { const url = prompt("重設網址：", l.url591); if (url) { l.url591 = url; db.ref('team_data/logs').set(logs); } } }
        }

        function showDB(n) {
            const p = ps.find(x => x.n === n); document.getElementById('dashboard').classList.add('active');
            const currentTracks = logs.filter(l => l.name === n && l.process.includes("暫時拒絕但可追蹤")).length;
            const totalSucc = (p.fee_count || 0) + (p.line_count || 0) + (p.con_count || 0);
            const rate = p.count > 0 ? Math.min(100, (totalSucc / p.count * 100)).toFixed(1) : 0;
            const actD = new Set(logs.filter(l => l.name === n && l.timestamp > Date.now() - 864000000 && l.gain > 0).map(l => new Date(l.timestamp).toDateString())).size;
            document.getElementById('db-content').innerHTML = `
                <div style="width:140px;height:140px;margin:10px auto;border:3px solid #333;border-radius:20px;overflow:hidden;"><img src="${p.avatar||''}" style="width:100%;height:100%;object-fit:cover;"></div>
                <h2 style="text-align:center;margin:0;">${p.n}</h2>
                <div class="radar-box"><canvas id="dbRadarChart"></canvas></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"><div class="stat-card">總積分<span>${Math.floor(p.s||0)}</span></div><div class="stat-card">成功率<span>${rate}%</span></div><div class="stat-card">直接委託<span>${p.con_count||0}</span></div><div class="stat-card">加Line<span>${p.line_count||0}</span></div><div class="stat-card">接受服務費<span>${totalSucc}</span></div><div class="stat-card">總開發<span>${p.count||0}</span></div><div class="stat-card">被拒絕<span>${p.refused_count||0}</span></div><div class="stat-card">穩定度<span>${actD}天/10日</span></div><div class="stat-card">追蹤中<span>${currentTracks}</span></div></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;"><button onclick="changeName('${n}')" style="background:#333;color:#fff;border:none;padding:12px;border-radius:10px;font-size:12px;">更改姓名</button><button onclick="document.getElementById('fI').click()" style="background:var(--success);color:#000;border:none;padding:12px;border-radius:10px;font-size:12px;font-weight:bold;">上傳照片</button></div>
                <button onclick="changeA('${n}')" style="width:100%;margin-top:10px;background:#1a1a1a;color:#666;border:none;padding:10px;border-radius:10px;font-size:12px;">更換照片網址</button><input type="file" id="fI" style="display:none" onchange="hU('${n}')">`;
            setTimeout(() => {
                const ctx = document.getElementById('dbRadarChart').getContext('2d'); if(dbRadar) dbRadar.destroy();
                dbRadar = new Chart(ctx, { type: 'radar', data: { labels: ['進攻力', '轉換力', '持久力', '親和力', '穩定度'], datasets: [{ data: [Math.min(1, totalSucc > 0 ? (p.con_count||0)/totalSucc : 0), Math.min(1, p.count > 0 ? totalSucc/p.count : 0), Math.min(1, (p.count||0)/(ps.reduce((a,b)=>a+(b.count||0),0)||1)), Math.min(1, totalSucc > 0 ? (p.line_count||0)/totalSucc : 0), actD/10], backgroundColor: 'rgba(0, 212, 255, 0.3)', borderColor: '#00d4ff', borderWidth: 2, pointRadius: 0 }] }, options: { maintainAspectRatio: false, scales: { r: { min: 0, max: 1, ticks: { display: false }, grid: { color: '#333' }, angleLines: { color: '#333' }, pointLabels: { color: '#888', font: { size: 11, weight: 'bold' } } } }, plugins: { legend: { display: false } } } });
            }, 100);
        }

        function convertLog(idx) {
            const l = logs[idx]; const p = ps.find(x => x.n === l.name);
            const choice = prompt("轉換：\n1. 成功委託 (+120)\n2. 服務費 (+100)\n3. 加Line (+120)", "3"); if (!choice) return;
            let m = 1; if (l.rentRange.includes("1-2萬")) m = 1.2; else if (l.rentRange.includes("2-3萬")) m = 1.4; else if (l.rentRange.includes("3-4萬")) m = 1.6; else if (l.rentRange.includes("4萬以上")) m = 2;
            let rVal = 0, type = "line"; if (choice === "1") { rVal = 120; type = "contract"; p.con_count = (p.con_count || 0) + 1; } else if (choice === "2") { rVal = 100; p.fee_count = (p.fee_count || 0) + 1; } else if (choice === "3") { rVal = 120; p.line_count = (p.line_count || 0) + 1; } else return;
            let gain = Math.floor(rVal * m); p.s += gain; p.combo = (p.combo || 0) + 1; l.gain = gain; l.type = type; l.process = (choice === "1" ? "成功約到委託" : choice === "2" ? "接受服務費" : "加Line並配案");
            db.ref('team_data').set({ players: ps, logs, config, archives });
            showVictory(gain, getRandomEncouragement(true), true);
        }

        function getRandomEncouragement(isSuccess, isTrack = false) {
            const succList = ["你是開發天才嗎？", "這單穩了！", "屋主被你征服了！", "太帥了，業績噴發！", "優式戰神就是你！", "漂亮的一擊！"];
            const trackList = ["蹲得越低跳得越高，這筆之後必簽！", "追蹤是業績的靈魂，穩住！", "屋主已經在動搖了，繼續加油！"];
            const failList = ["沒關係，下一通會更好！", "業務就是在拒絕中成長的！", "調整呼吸，下一位就是你的客戶！"];
            if (isTrack) return trackList[Math.floor(Math.random() * trackList.length)];
            return isSuccess ? succList[Math.floor(Math.random() * succList.length)] : failList[Math.floor(Math.random() * failList.length)];
        }

        function processBattle() {
            const p = ps.find(x => x.n === document.getElementById('p-select').value);
            const rValRaw = document.getElementById('r-select').value; const rVal = parseFloat(rValRaw); const m = parseFloat(document.getElementById('m-select').value); const now = new Date();
            if(rValRaw === '999') {
                logs.unshift({ name: p.n, fullDate: `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`, gain: 0, process: "暫時拒絕但可追蹤", rentRange: document.getElementById('m-select').options[document.getElementById('m-select').selectedIndex].text, roomType: document.getElementById('type-select').value, note: '', locked: false, type: 'line', timestamp: now.getTime() });
                p.count = (p.count || 0) + 1; db.ref('team_data').set({ players: ps, logs, config, archives });
                showVictory(0, getRandomEncouragement(false, true), false);
                return;
            }
            let gain = (rVal >= 100) ? Math.floor((rVal * m) + (p.combo * 10)) : 0;
            p.s += gain; p.combo = gain > 0 ? (p.combo || 0) + 1 : 0; p.count = (p.count || 0) + 1;
            if (rValRaw === '120_con') p.con_count = (p.con_count || 0) + 1; else if (rVal === 100) p.fee_count = (p.fee_count || 0) + 1; else if (rVal === 120) p.line_count = (p.line_count || 0) + 1; else if (rVal === 0) p.refused_count = (p.refused_count || 0) + 1;
            logs.unshift({ name: p.n, fullDate: `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`, gain, process: document.getElementById('r-select').options[document.getElementById('r-select').selectedIndex].text, rentRange: document.getElementById('m-select').options[document.getElementById('m-select').selectedIndex].text, roomType: document.getElementById('type-select').value, note: '', locked: false, type: (rValRaw === '120_con' ? 'contract' : 'line'), timestamp: now.getTime() });
            db.ref('team_data').set({ players: ps, logs, config, archives });
            showVictory(gain, getRandomEncouragement(gain > 0), gain > 0);
        }

        setInterval(() => {
            const now = new Date(); const last = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59);
            const d = Math.floor((last-now)/86400000), h = Math.floor(((last-now)%86400000)/3600000), m = Math.floor(((last-now)%3600000)/60000), s = Math.floor(((last-now)%60000)/1000);
            document.getElementById('countdown').innerHTML = `${d}d ${h}h ${m}m ${s}s`;
        }, 1000);

        function switchPage(p) { document.querySelectorAll('.page-content').forEach(el => el.style.display='none'); document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active')); document.getElementById('page-'+p).style.display='flex'; document.getElementById('ni-'+p).classList.add('active'); toggleNav(); if(p==='analysis') setTimeout(renderCharts,100); }
        function renderCharts() { if(rc) rc.destroy(); if(tc) tc.destroy(); const rd = ["雅房", "套房", "2房", "3房", "4房"].map(t => logs.filter(l => l.roomType === t).length); rc = new Chart(document.getElementById('roomChart'), { type: 'bar', data: { labels: ["雅房", "套房", "2房", "3房", "4房"], datasets: [{ label: '案件數', data: rd, backgroundColor: '#00d4ff' }] } }); const td = new Array(24).fill(0); logs.forEach(l => { if(l.timestamp) td[new Date(l.timestamp).getHours()]++; }); tc = new Chart(document.getElementById('timeChart'), { type: 'line', data: { labels: Array.from({length:24},(_,i)=>i+':00'), datasets: [{ label: '熱度', data: td, borderColor: '#ffce00' }] } }); }
        function toggleNav() { document.getElementById('side-nav').classList.toggle('active'); }
        function toggleSettings() { const s = document.getElementById('settings-content'); s.style.display = s.style.display==='none'?'block':'none'; }
        function closeDB() { document.getElementById('dashboard').classList.remove('active'); if(dbRadar) dbRadar.destroy(); }
        function upN(i, v) { logs[i].note = v; db.ref('team_data/logs').set(logs); }
        function upLD(i, v) { logs[i].listDetail = v; db.ref('team_data/logs').set(logs); }
        function toggleLock(i) { logs[i].locked = !logs[i].locked; db.ref('team_data/logs').set(logs); }
        
        // 刪除扣分
        function deleteLog(i) { if(confirm('確定刪除紀錄並扣除積分嗎？')){ const l = logs[i], p = ps.find(x => x.n === l.name); if (p) { p.s = Math.max(0, p.s - (l.gain || 0)); p.count = Math.max(0, p.count - 1); if (l.process.includes("委託")) p.con_count = Math.max(0, (p.con_count || 0) - 1); else if (l.process.includes("服務費")) p.fee_count = Math.max(0, (p.fee_count || 0) - 1); else if (l.process.includes("Line")) p.line_count = Math.max(0, (p.line_count || 0) - 1); else if (l.process.includes("拒絕") && !l.process.includes("暫時")) p.refused_count = Math.max(0, (p.refused_count || 0) - 1); } logs.splice(i,1); db.ref('team_data').set({players: ps, logs, config, archives}); } }
        
        function addNewPlayer() { const n = prompt("姓名："); if(n) { ps.push({n, s:0, count:0, fee_count:0, con_count:0, line_count:0, refused_count:0, combo:0, avatar:""}); db.ref('team_data/players').set(ps); } }
        function removePlayer() { const n = prompt("移除姓名："); if(n) { ps = ps.filter(x => x.n !== n); db.ref('team_data/players').set(ps); } }
        function changeName(old) { const n = prompt("新姓名：", old); if(n){ const p = ps.find(x=>x.n===old); p.n=n; db.ref('team_data/players').set(ps); showDB(n); } }
        function hU(n) { const f = document.getElementById('fI').files[0]; if(f){ const r = new FileReader(); r.onload=(e)=>{ ps.find(x=>x.n===n).avatar=e.target.result; db.ref('team_data/players').set(ps); showDB(n); }; r.readAsDataURL(f); } }
        function changeGameBG() { const u = prompt("網址："); if(u){ config.bg = u; db.ref('team_data/config').set(config); } }
        function fullReset() { if(confirm('歸零？')){ archives.unshift({date:Date.now(), totalCount:logs.length}); ps.forEach(p=>{p.s=0;p.count=0;p.combo=0;p.fee_count=0;p.con_count=0;p.line_count=0;p.refused_count=0;}); db.ref('team_data').set({players:ps, logs:[], config, archives}); } }
        
        // [補回核心函數] 價位顏色區分
        function getL(r) { if(r==='4萬以上') return 'tag-lv5'; if(r.includes('3-4')) return 'tag-lv4'; if(r.includes('2-3')) return 'tag-lv3'; if(r.includes('1-2') || r.includes('1.2') || r.includes('1萬-2萬')) return 'tag-lv2'; return 'tag-lv1'; }
        
        function showVictory(s, m, w) { document.getElementById('vic-score').innerText = w ? `+${s}` : `+0`; document.getElementById('vic-msg').innerText = m; document.getElementById('vic-title').innerText = w ? "VICTORY" : "KEEP GOING"; document.getElementById('vic-box').style.borderColor = w ? "var(--lv3)" : "var(--lv2)"; document.getElementById('victory-mask').style.display = 'flex'; if (w) confetti({ particleCount: 150, spread: 70 }); }
        function changeA(n) { const u = prompt("照片網址："); if(u){ ps.find(x=>x.n===n).avatar=u; db.ref('team_data/players').set(ps); showDB(n); } }
    </script>
</body>
</html>
